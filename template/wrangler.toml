name = "r2-explorer"
compatibility_date = "2024-11-06"
main = "src/index.ts"
assets = { directory = "node_modules/r2-explorer/dashboard", binding = "ASSETS", html_handling = "auto-trailing-slash", not_found_handling = "single-page-application", run_worker_first = ["/api/*", "/share/*"] }

# Configuration via environment variables.
# Docs: https://r2explorer.com/getting-started/configuration/
# [vars]
# R2_EXPLORER_READONLY = "true"
# R2_EXPLORER_CORS = "false"
# R2_EXPLORER_SHOW_HIDDEN_FILES = "false"
# R2_EXPLORER_BASIC_AUTH_USERNAME = "username"
# R2_EXPLORER_BASIC_AUTH_PASSWORD = "password"
# R2_EXPLORER_CF_ACCESS_TEAM_NAME = "your-team"
# R2_EXPLORER_DASHBOARD_URL = "https://example.com"
# R2_EXPLORER_EMAIL_ROUTING_TARGET_BUCKET = "BUCKET"

# Bind R2 Buckets to your application.
# Docs: https://r2explorer.com/getting-started/add-r2-buckets/
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "bucket"
